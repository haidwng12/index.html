    function verifyCaptcha() { const ans = document.getElementById('captchaAnswer')?.value.trim(); if (!ans || parseInt(ans) !== currentCaptcha.answer) { showToast("Mã xác minh sai!", "error"); return false; } return true; }

    }
    function requestResetPassword() {
        const email = prompt("Nhập email đã đăng ký:");
        if (!email) return;
        const user = db.users.find(u => u.email === email);
        if (!user) { showToast("Email không tồn tại!", "error"); return; }

        db.resetTokens.push({ token, userId: user.id, expires: Date.now() + 24*60*60*1000 });

        const resetLink = `${window.location.origin}${window.location.pathname}?reset_token=${token}`;
        sendResetLink(email, resetLink, user.fullName || user.username);

    function showResetPasswordModal(token) {

    function validateCoupon(code, amount) {
        const coupon = db.coupons.find(c => c.code.toUpperCase() === code.toUpperCase());
        if (!coupon) return { valid: false, message: "Mã không tồn tại" };
        if (coupon.maxUses && coupon.usedCount >= coupon.maxUses) return { valid: false, message: "Mã đã hết lượt" };
        if (coupon.expiresAt && new Date(coupon.expiresAt) < new Date()) return { valid: false, message: "Mã đã hết hạn" };
        let discount = 0;
        if (coupon.type === 'percent') discount = amount * coupon.value / 100;
        else discount = Math.min(coupon.value, amount);
        return { valid: true, discount: Math.floor(discount), coupon: coupon };
    }
    async function buySingle(packageId, quantity, discount=0, usedCoupon=null, finalTotal=null) {
        const pkg = db.packages.find(p => p.id === packageId);
        if (!pkg) return false;
        const total = finalTotal !== null ? finalTotal : pkg.price * quantity - discount;
        if ((currentUser.balance || 0) < total) { showToast(`Số dư không đủ. Cần ${total.toLocaleString()}đ`, "error"); return false; }
        const available = db.keys.filter(k => k.packageId === packageId && !k.used);
        if (available.length < quantity) { showToast("Hết key, liên hệ admin", "error"); return false; }
        currentUser.balance -= total;
        const orderId = Date.now();
        const now = Date.now();
        const purchasedKeys = [];
        const usedKeys = available.slice(0, quantity);
        for (let i=0; i<quantity; i++) {
            const key = usedKeys[i];
            key.used = true;
            key.orderId = orderId;
            key.activatedAt = now;
            key.expiresAt = now + pkg.days * 86400000;
            key.autoRenew = false;
            purchasedKeys.push(key.code);
        }
        if (usedCoupon) usedCoupon.usedCount++;
        let referralBy = null;
        if (currentUser.referredBy) {
            const referrer = db.users.find(u => u.id === currentUser.referredBy);
            if (referrer) {
                const commission = Math.floor(total * db.affiliateSettings.commissionPercent / 100);
                referrer.balance += commission;
                referrer.commissionEarned = (referrer.commissionEarned || 0) + commission;
                referralBy = referrer.id;
            }
        }
        db.orders.unshift({ id: orderId, userId: currentUser.id, items: [{ type: 'single', packageId, packageName: pkg.name, quantity, price: pkg.price, discount, finalPrice: total }], total, status: 'completed', createdAt: new Date().toISOString(), keyDelivered: true, keys: purchasedKeys, couponCode: usedCoupon ? usedCoupon.code : null, referralBy });
        saveDb(); updateUIForUser();
        showToast(`Mua thành công ${quantity} ${pkg.name}!`, "success");
        showKeysModal(purchasedKeys, pkg.name);
        if (currentPage === 'history') renderHistoryPage();
        if (currentPage === 'home') renderHomePage();
        if (currentUser.role === 'admin') renderAdminPage();
        return true;
    }

    function requestRecharge() {
        if (!currentUser) { showToast("Vui lòng đăng nhập", "error"); return; }

    window.addBulkKeys = function() {
        const text = document.getElementById('bulkKeys').value;
        const packageId = parseInt(document.getElementById('bulkPackage').value);

        let added = 0;

                db.keys.push({ id: Date.now(), packageId, code: line.trim(), used: false, orderId: null, activatedAt: null, expiresAt: null, autoRenew: false });
                added++;
            }

        showToast(`Đã thêm ${added} key`, "success");

    window.addCoupon = function() {
        const code = prompt("Mã giảm giá:"); if(!code) return;
        const type = confirm("Loại? OK = %, Cancel = số tiền") ? "percent" : "fixed";
        const value = parseFloat(prompt("Giá trị:"));
        if(isNaN(value)) return;
        const maxUses = parseInt(prompt("Số lần tối đa (0=không giới hạn):") || "0");
        const expires = prompt("Ngày hết hạn (YYYY-MM-DD):");
        let expiresAt = null;
        if(expires) { const d = new Date(expires); if(!isNaN(d)) expiresAt = d.toISOString(); }
        db.coupons.push({ id: Date.now(), code: code.toUpperCase(), type, value, maxUses: maxUses||0, usedCount: 0, expiresAt });
        saveDb(); renderAdminTab('coupons'); showToast("Thêm mã thành công","success");
    };
    window.editCoupon = function(id) {
        const c = db.coupons.find(c=>c.id===id); if(!c) return;
        const newCode = prompt("Mã mới:", c.code); if(newCode) c.code = newCode.toUpperCase();
        const newType = confirm("Loại? OK = %, Cancel = số tiền") ? "percent" : "fixed"; c.type = newType;
        const newVal = parseFloat(prompt("Giá trị mới:", c.value)); if(!isNaN(newVal)) c.value = newVal;
        const newMax = parseInt(prompt("Số lần tối đa:", c.maxUses)); if(!isNaN(newMax)) c.maxUses = newMax;
        const newExp = prompt("Ngày hết hạn (YYYY-MM-DD):", c.expiresAt?new Date(c.expiresAt).toISOString().slice(0,10):""); if(newExp){ const d=new Date(newExp); if(!isNaN(d)) c.expiresAt=d.toISOString(); else c.expiresAt=null; } else c.expiresAt=null;
        saveDb(); renderAdminTab('coupons'); showToast("Cập nhật thành công","success");

    window.addBundle = function() {
        const name = prompt("Tên combo:"); if(!name) return;
        const desc = prompt("Mô tả:"); if(!desc) return;
        const price = parseInt(prompt("Giá:"));
        if(isNaN(price)) return;
        let items = [];
        while(true){
            const pkgList = db.packages.map(p=>`${p.id}: ${p.name}`).join("\n");
            const pkgId = prompt(`ID gói đơn:\n${pkgList}\nNhập 'done' để kết thúc:`);
            if(pkgId==='done') break;
            const pid = parseInt(pkgId);
            if(!db.packages.find(p=>p.id===pid)){ alert("ID không hợp lệ"); continue; }
            const qty = parseInt(prompt("Số lượng:"));
            if(isNaN(qty)) continue;
            items.push({ packageId: pid, quantity: qty });
        }
        if(items.length===0) return;
        db.bundles.push({ id: Date.now(), name, description: desc, price, items });
        saveDb(); renderAdminTab('bundles'); renderHomePage(); showToast("Thêm combo","success");
    };

    // ==================== SAO LƯU DỮ LIỆU ====================
    window.exportBackup = function() {
        const dataStr = JSON.stringify(db, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `phantom_backup_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast("Đã xuất file sao lưu!", "success");
    };
    window.importBackup = function() {
        const fileInput = document.getElementById('restoreFile');
        if (!fileInput.files.length) { showToast("Vui lòng chọn file JSON", "error"); return; }
        const file = fileInput.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if (imported.users && imported.packages) {
                    db = imported;
                    saveDb();
                    // Reload lại trang để cập nhật giao diện
                    alert("Phục hồi thành công! Trang sẽ tải lại.");
                    location.reload();
                } else {
                    showToast("File không đúng định dạng backup!", "error");
                }
            } catch(err) {
                showToast("Lỗi đọc file: " + err.message, "error");
            }
        };
        reader.readAsText(file);
    };

    function showAuthModal() {
        const modalHtml = `<div id="authModal" class="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-[1000]"><div class="bg-gray-800 rounded-2xl p-6 max-w-md w-full border border-green-500/30"><div class="flex justify-between items-center mb-4"><h3 class="text-xl font-bold text-green-400" id="authTitle">Đăng nhập</h3></div><div id="authForm"></div></div></div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        let isLogin = true;
        function renderAuthForm() {
            const formDiv = document.getElementById('authForm');
            if (isLogin) {
                formDiv.innerHTML = `<input type="text" id="loginUsername" placeholder="Tên đăng nhập" class="w-full bg-gray-700 px-3 py-2 rounded-lg mb-3"><input type="password" id="loginPassword" placeholder="Mật khẩu" class="w-full bg-gray-700 px-3 py-2 rounded-lg mb-3">${renderCaptcha()}<button id="doLogin" class="w-full btn-primary py-2 rounded-lg">Đăng nhập</button><p class="text-center mt-4"><button id="switchToRegister" class="text-green-400">Chưa có tài khoản? Đăng ký</button> | <button id="forgotPasswordBtn" class="text-yellow-400">Quên mật khẩu?</button></p>`;
                document.getElementById('doLogin').onclick = () => {
                    if (!verifyCaptcha()) return;
                    const user = db.users.find(u => u.username === document.getElementById('loginUsername').value && u.password === document.getElementById('loginPassword').value);
                    if (user) { setCurrentUser(user); document.getElementById('authModal').remove(); showToast("Đăng nhập thành công","success"); }
                    else showToast("Sai tài khoản hoặc mật khẩu","error");
                };
                document.getElementById('switchToRegister').onclick = () => { isLogin = false; renderAuthForm(); };
                document.getElementById('forgotPasswordBtn').onclick = () => { document.getElementById('authModal').remove(); requestResetPassword(); };
            } else {
                formDiv.innerHTML = `<input type="text" id="regUsername" placeholder="Tên đăng nhập" class="w-full bg-gray-700 px-3 py-2 rounded-lg mb-3"><input type="text" id="regFullName" placeholder="Họ và tên" class="w-full bg-gray-700 px-3 py-2 rounded-lg mb-3"><input type="email" id="regEmail" placeholder="Email" class="w-full bg-gray-700 px-3 py-2 rounded-lg mb-3"><input type="tel" id="regPhone" placeholder="Số điện thoại" class="w-full bg-gray-700 px-3 py-2 rounded-lg mb-3"><input type="password" id="regPassword" placeholder="Mật khẩu" class="w-full bg-gray-700 px-3 py-2 rounded-lg mb-3"><input type="password" id="regConfirm" placeholder="Xác nhận mật khẩu" class="w-full bg-gray-700 px-3 py-2 rounded-lg mb-3">${renderCaptcha()}<button id="doRegister" class="w-full btn-primary py-2 rounded-lg">Đăng ký</button><p class="text-center mt-4"><button id="switchToLogin" class="text-green-400">Đã có tài khoản? Đăng nhập</button></p>`;
                document.getElementById('doRegister').onclick = () => {
                    if (!verifyCaptcha()) return;
                    const username = document.getElementById('regUsername').value.trim();
                    const fullName = document.getElementById('regFullName').value.trim();
                    const email = document.getElementById('regEmail').value.trim();
                    const phone = document.getElementById('regPhone').value.trim();
                    const pwd = document.getElementById('regPassword').value;
                    const confirm = document.getElementById('regConfirm').value;
                    if (!username || !fullName || !email || !pwd) { showToast("Vui lòng nhập đầy đủ","error"); return; }
                    if (pwd !== confirm) { showToast("Mật khẩu xác nhận không khớp","error"); return; }
                    if (db.users.find(u => u.username === username)) { showToast("Tên đã tồn tại","error"); return; }
                    if (db.users.find(u => u.email === email)) { showToast("Email đã được sử dụng","error"); return; }
                    const urlParams = new URLSearchParams(window.location.search);
                    const refCode = urlParams.get('ref');
                    let referredBy = null;
                    if (refCode) {
                        const referrer = db.users.find(u => u.referralCode === refCode);
                        if (referrer) { referredBy = referrer.id; if(!referrer.referrals) referrer.referrals=[]; referrer.referrals.push(username); }
                    }
                    const newUser = { id: Date.now(), username, password: pwd, email, role: 'user', balance: 0, fullName, phone, address: "", createdAt: new Date().toISOString(), referralCode: username + Math.random().toString(36).substring(2,6).toUpperCase(), referrals: [], commissionEarned: 0, referredBy };
                    db.users.push(newUser);
                    saveDb();
                    setCurrentUser(newUser);
                    document.getElementById('authModal').remove();
                    showToast("Đăng ký thành công","success");
                };
                document.getElementById('switchToLogin').onclick = () => { isLogin = true; renderAuthForm(); };
            }
        }
        renderAuthForm();
    }
    function showToast(msg, type) { const toast = document.createElement('div'); toast.className = `toast ${type==='error'?'toast-error':''}`; toast.innerHTML = `<i class="fas fa-${type==='success'?'check-circle':'exclamation-circle'} mr-2"></i> ${msg}`; document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000); }
    function demoAlert() { alert("Đây là demo, chức năng tải script chưa có."); }

    // ==================== ROUTER ====================
    let currentPage = 'home';
    function setPage(page) { currentPage = page; renderCurrentPage(); document.querySelectorAll('.nav-link').forEach(link => { if(link.getAttribute('data-page')===page) link.classList.add('text-green-400'); else link.classList.remove('text-green-400'); }); }
    function renderCurrentPage() {
        if (currentPage === 'home') renderHomePage();
        else if (currentPage === 'profile') renderProfilePage();
        else if (currentPage === 'affiliate') renderAffiliatePage();
        else if (currentPage === 'history') renderHistoryPage();
        else if (currentPage === 'support') renderSupportPage();
        else if (currentPage === 'admin') renderAdminPage();
    }

    initSampleData();
    loadCurrentUser();
    if (!currentUser) showAuthModal();
    else { document.getElementById('appContent').style.display = 'flex'; setPage('home'); }

    const resetToken = new URLSearchParams(window.location.search).get('reset_token');
    if (resetToken) { const entry = db.resetTokens.find(t => t.token === resetToken && t.expires > Date.now()); if (entry) showResetPasswordModal(resetToken); else alert("Token không hợp lệ hoặc đã hết hạn"); window.history.replaceState({}, document.title, window.location.pathname); }

    document.addEventListener('click', function(e) {
        if (e.target.closest('.nav-link')) { e.preventDefault(); setPage(e.target.closest('.nav-link').getAttribute('data-page')); }
        if (e.target.closest('#userBtn')) { document.getElementById('userDropdown').classList.toggle('hidden'); }
        if (e.target.closest('#logoutBtn')) { e.preventDefault(); setCurrentUser(null); showToast("Đã đăng xuất","success"); }
    });
    window.addEventListener('click', (e) => { if (!e.target.closest('#userMenu')) document.getElementById('userDropdown').classList.add('hidden'); });
</script>
